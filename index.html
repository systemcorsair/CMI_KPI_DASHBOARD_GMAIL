<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMI · KPI Dashboard V37</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3ef;--sf:#fff;--sf2:#eeede8;
  --bd:#dddcd5;--bd2:#c8c7bf;
  --tx:#1a1a17;--mu:#68675f;--hi:#a0a099;
  --bl:#1255a0;--bl-bg:#e7f0fb;--bl-lt:#c4d8f4;
  --gn:#0b6b4e;--gn-bg:#dff3ec;
  --am:#7a4a08;--am-bg:#faebd5;
  --rd:#9c2828;--rd-bg:#fbe9e9;
  --lw:280px;--th:46px;--r:7px;--rl:11px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:13px;background:var(--bg);color:var(--tx);min-height:100vh;overflow:hidden}
input,button,select,textarea{font-family:inherit;font-size:13px}
button{cursor:pointer}
.hidden{display:none!important}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* post-logout Google button hover */
#gsi-post-btn:hover{box-shadow:0 2px 8px rgba(0,0,0,.2)!important;border-color:#c6c6c6!important}

/* ── LOGIN ── */
#pg-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.lcard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:36px;width:340px}
.lbrand{font-size:22px;font-weight:700;margin-bottom:3px}
.lsub{color:var(--mu);font-size:12px;margin-bottom:26px}
.lf{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.lf label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mu)}
.lf input{padding:9px 11px;border:1px solid var(--bd);border-radius:var(--r);
  background:var(--sf);color:var(--tx);font-size:14px}
.lf input:focus{outline:none;border-color:var(--bl);box-shadow:0 0 0 3px rgba(18,85,160,.1)}
/* GIS renders its own button inside #gsi-btn-wrap */
#l-err{color:var(--rd);font-size:12px;margin-top:8px;padding:7px 10px;
  background:var(--rd-bg);border-radius:var(--r);display:none}
.lhint{margin-top:18px;padding-top:14px;border-top:1px solid var(--bd);
  font-size:11px;color:var(--hi);line-height:1.6}
.lhint b{color:var(--mu)}

/* ── TOPBAR ── */
.topbar{height:var(--th);background:var(--sf);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;
  position:fixed;top:0;left:0;right:0;z-index:100}
.tlogo{font-weight:700;font-size:14px}
.tlogo span{color:var(--mu);font-weight:400}
.tright{display:flex;align-items:center;gap:10px}
/* FIX #2: sync badge is now muted/subtle */
#sync-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:400;
  color:var(--hi);background:transparent;cursor:pointer;border:none;
  transition:color .2s}
#sync-badge:hover{color:var(--mu)}
/* FIX #3a: t-badge = dept abbreviation badge (e.g. "HR")
   To remove: comment out the line   el('t-badge').textContent = U.dept;  in startApp() */
.tbadge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:12px}
.tba{background:var(--bl-bg);color:var(--bl)}
.tbm{background:var(--am-bg);color:var(--am)}
/* FIX #3b: t-name = user's full name text (e.g. "Ms Chau")
   To remove: comment out the line   el('t-name').textContent = U.name;  in startApp() */
.tav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700}
#btn-logout{padding:5px 11px;border-radius:var(--r);border:1px solid var(--bd2);
  background:transparent;color:var(--mu);font-size:11px}
#btn-logout:hover{background:var(--sf2);color:var(--tx)}

/* ── SHELL ── */
#pg-app{display:none;flex-direction:column}
.shell{display:flex;height:calc(100vh - var(--th));margin-top:var(--th)}
.lp{width:var(--lw);flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);
  overflow:hidden;display:flex;flex-direction:column}
.lp-sc{flex:1;overflow-y:auto;padding:0 0 14px 0}
.rp{flex:1;min-width:0;overflow-y:auto;padding:0 20px 18px;background:var(--bg)}
.lsec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--hi);margin:14px 0 7px}
.lsec:first-child{margin-top:0}

/* ── DATE RANGE ── */
.dr-box{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);
  padding:10px 11px;margin-bottom:4px}
.dr-quick{display:flex;gap:4px;margin-bottom:8px}
.drq{padding:3px 9px;border-radius:12px;border:1px solid var(--bd);
  background:transparent;color:var(--mu);font-size:10px;font-weight:600;cursor:pointer}
.drq:hover,.drq.act{background:var(--bl);color:#fff;border-color:var(--bl)}
.dr-row{display:flex;gap:5px;align-items:center;margin-bottom:6px}
.dr-row label{font-size:10px;color:var(--mu);width:26px;font-weight:600;flex-shrink:0}
.drsel,.mysel{flex:1;padding:5px 7px;border:1px solid var(--bd);border-radius:var(--r);
  background:var(--sf);color:var(--tx);font-size:11px}
.dr-apply{width:100%;padding:6px;border:none;border-radius:var(--r);
  background:var(--bl);color:#fff;font-size:11px;font-weight:600;cursor:pointer;margin-top:3px}

/* ── ACCORDION ── */
.acc{border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:6px}
.acc-h{display:flex;align-items:center;gap:7px;padding:9px 10px;cursor:pointer;
  user-select:none;transition:background .12s}
.acc-h:hover,.acc-h.open{background:var(--bl-bg)}
.ah-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ah-info{flex:1;min-width:0}
.ah-name{font-weight:600;font-size:12px;line-height:1.2}
/* FIX #5: last data month shown under dept name */
.ah-last{font-size:10px;color:var(--hi);margin-top:1px}
.ah-last.ok{color:var(--gn)}
.ah-last.warn{color:var(--am)}
.ah-last.miss{color:var(--rd)}
.ah-st{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.st-ok{background:#1D9E75}.st-pend{background:#EF9F27}
.ah-ch{font-size:9px;color:var(--hi);transition:transform .2s;flex-shrink:0}
.ah-ch.open{transform:rotate(90deg)}
.acc-b{display:none;border-top:1px solid var(--bd);background:var(--sf2);padding:10px 11px}
.acc-b.open{display:block}
.ks-row{display:flex;align-items:baseline;padding:4px 0;border-bottom:1px solid var(--bd)}
.ks-row:last-of-type{border-bottom:none}
.ks-l{font-size:11px;color:var(--mu);flex:1}
.ks-v{font-size:12px;font-weight:600}
.ks-d{font-size:10px;margin-left:4px}
.du{color:var(--gn)}.dd{color:var(--rd)}.dn{color:var(--hi)}
.ks-cmt{margin-top:7px;padding:6px 8px;background:var(--sf);border-radius:var(--r);
  font-size:11px;color:var(--mu);font-style:italic;line-height:1.4;border:1px solid var(--bd)}
.vc-btn{width:100%;margin-top:8px;padding:6px;border-radius:var(--r);
  border:1px solid var(--bl-lt);background:var(--bl-bg);color:var(--bl);
  font-size:11px;font-weight:600;cursor:pointer}
.vc-btn:hover{background:var(--bl-lt)}

/* ── INPUT FORM ── */
.my-row{display:flex;gap:6px;margin-bottom:11px}
.mysel{padding:7px 8px;font-size:12px;font-weight:500}
.inp-st{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;padding:6px 9px;border-radius:var(--r);
  background:var(--sf2);border:1px solid var(--bd)}
.badge{display:inline-flex;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.bg{background:var(--gn-bg);color:var(--gn)}
.ba{background:var(--am-bg);color:var(--am)}
.ki-list{display:flex;flex-direction:column;gap:9px;margin-bottom:12px}
.ki{display:flex;flex-direction:column;gap:3px}
.ki label{font-size:11px;color:var(--mu);font-weight:600}
/* delta row inside each KPI input */
.ki-lbl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.ki-lbl-row label{margin-bottom:0}
.ki-delta{font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;white-space:nowrap}
.ki-delta.du{background:var(--gn-bg);color:var(--gn)}
.ki-delta.dd{background:var(--rd-bg);color:var(--rd)}
.ki-delta.dn{color:var(--hi)}
.ki-vs{font-weight:400;font-size:10px}
/* Change password button */
.chpw-btn{width:100%;padding:7px;border-radius:var(--r);border:1px solid var(--bd2);
  background:transparent;color:var(--mu);font-size:12px;cursor:pointer;margin-top:2px;text-align:left}
.chpw-btn:hover{background:var(--sf2);color:var(--tx)}
/* Change password in-flow modal */
.pw-modal{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);
  padding:14px;margin-top:10px;display:flex;flex-direction:column;gap:8px}
.pw-modal label{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.6px;color:var(--mu)}
.pw-modal input{padding:7px 9px;border:1px solid var(--bd);border-radius:var(--r);
  background:var(--sf);color:var(--tx);font-size:13px;width:100%}
.pw-modal input:focus{outline:none;border-color:var(--bl)}
.pw-save{width:100%;padding:7px;border:none;border-radius:var(--r);
  background:var(--bl);color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.pw-save:hover{opacity:.88}
.pw-msg{font-size:11px;text-align:center;margin-top:2px;display:none}
.ki-in{padding:7px 9px;border:1px solid var(--bd);border-radius:var(--r);
  background:var(--sf);color:var(--tx);width:100%}
.ki-in:focus{outline:none;border-color:var(--bl)}
/* V36: per-KPI note field */
.ki-note-in{padding:5px 9px;border:1px solid var(--bd);border-radius:var(--r);
  background:var(--sf2);color:var(--mu);width:100%;font-size:11px;
  font-style:italic;margin-top:3px}
.ki-note-in:focus{outline:none;border-color:var(--bl);background:var(--sf);color:var(--tx)}
.ki-ta{padding:7px 9px;border:1px solid var(--bd);border-radius:var(--r);
  background:var(--sf);color:var(--tx);resize:none;min-height:50px;
  width:100%;font-family:inherit;font-size:12px;line-height:1.4}
.ki-ta:focus{outline:none;border-color:var(--bl)}
.sv-btn{width:100%;padding:9px;border:none;border-radius:var(--r);
  background:var(--bl);color:#fff;font-size:13px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:6px}
.sv-btn:hover{opacity:.88}
.sv-ok{font-size:11px;text-align:center;color:var(--gn);margin-top:5px;display:none;font-weight:600}
.sv-er{font-size:11px;text-align:center;color:var(--rd);margin-top:5px;display:none}
.spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;display:none}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── RIGHT PANEL ── */
/* FIX #6: back button */
.rp-hdr{display:flex;align-items:flex-start;justify-content:space-between;
  position:sticky;top:0;z-index:10;background:var(--bg);
  margin:0 -20px 16px;padding:16px 20px 14px;
  border-bottom:1px solid var(--bd2);
  box-shadow:0 2px 8px rgba(0,0,0,.07)}
.rp-hdr-left{}
.rp-title{font-size:17px;font-weight:700;margin-bottom:3px}
.rp-sub{font-size:12px;color:var(--mu)}
#btn-bod-back{padding:6px 14px;border-radius:var(--r);border:1px solid var(--bd2);
  background:var(--sf);color:var(--mu);font-size:12px;white-space:nowrap;margin-top:2px}
#btn-bod-back:hover{background:var(--sf2);color:var(--tx)}
.charts-col{display:flex;flex-direction:column;gap:14px}
.cc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px}
.cc-t{font-size:13px;font-weight:700;margin-bottom:2px}
.cc-s{font-size:11px;color:var(--mu);margin-bottom:12px}
.cc-w{position:relative;height:185px}
.cc-w.tall{height:220px}
.legend{display:flex;gap:16px;margin-bottom:8px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mu)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* ── STATUS TABLE ── */
.stbl-w{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);
  overflow:hidden;margin-bottom:14px}
.stbl-h{padding:12px 16px;font-size:13px;font-weight:700;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between}
table{width:100%;border-collapse:collapse}
thead th{padding:8px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--mu);
  text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd)}
tbody td{padding:9px 14px;font-size:12px;border-bottom:1px solid var(--bd)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--sf2)}

/* LOCK/REVISION */
.rev-badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600;background:var(--bl-bg);color:var(--bl);margin-left:4px}
.lock-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--gn-bg);border:1px solid var(--gn);border-radius:var(--r);margin-bottom:10px;font-size:12px;color:var(--gn);font-weight:600}
.edit-btn{padding:4px 10px;border-radius:var(--r);border:1px solid var(--gn);background:var(--sf);color:var(--gn);font-size:11px;font-weight:600;cursor:pointer}
.edit-btn:hover{background:var(--gn);color:#fff}
/* MESSAGING */
/* msg-panel starts below topbar + rp-hdr sticky bar (~62px for title+padding) */
.msg-panel{position:fixed;right:0;top:calc(var(--th) + 62px);bottom:0;width:320px;background:var(--sf);border-left:1px solid var(--bd);border-top:1px solid var(--bd);display:flex;flex-direction:column;z-index:89;transform:translateX(100%);transition:transform .25s ease}
.msg-panel.open{transform:translateX(0)}
.msg-hdr{padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.msg-hdr-title{font-weight:600;font-size:13px}
.msg-close-btn{border:none;background:none;font-size:16px;color:var(--mu);cursor:pointer;padding:2px 6px}
.msg-close-btn:hover{color:var(--tx)}
.msg-thread{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.msg-bubble{max-width:85%;padding:8px 11px;border-radius:10px;font-size:12px;line-height:1.5;word-break:break-word}
.msg-from-me{align-self:flex-end;background:var(--bl);color:#fff;border-radius:10px 10px 2px 10px}
.msg-from-other{align-self:flex-start;background:var(--sf2);color:var(--tx);border-radius:10px 10px 10px 2px;border:1px solid var(--bd)}
.msg-meta{font-size:10px;opacity:.65;margin-top:3px}
.msg-compose{padding:10px 14px;border-top:1px solid var(--bd);display:flex;gap:7px}
.msg-txt-input{flex:1;padding:7px 10px;border:1px solid var(--bd);border-radius:var(--r);font-size:12px;resize:none;font-family:inherit;background:var(--sf)}
.msg-txt-input:focus{outline:none;border-color:var(--bl)}
.msg-send-btn2{padding:7px 12px;border:none;border-radius:var(--r);background:var(--bl);color:#fff;font-size:12px;font-weight:600;cursor:pointer;align-self:flex-end}
.msg-send-btn2:hover{opacity:.88}
.msg-action-btn{padding:5px 11px;border-radius:var(--r);border:1px solid var(--bd2);background:var(--sf);color:var(--mu);font-size:11px;cursor:pointer;margin-left:5px}
.msg-action-btn:hover{background:var(--sf2);color:var(--tx)}
.unread-dot{width:7px;height:7px;border-radius:50%;background:var(--rd);display:inline-block;margin-left:4px;vertical-align:middle}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center}
.modal-box{background:var(--sf);border-radius:var(--rl);width:560px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.modal-head{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:14px}
.modal-body{flex:1;overflow-y:auto;padding:14px 18px}
.modal-close-x{border:none;background:none;font-size:18px;color:var(--mu);cursor:pointer}
.modal-close-x:hover{color:var(--tx)}
.hist-item{padding:9px 0;border-bottom:1px solid var(--bd)}
.hist-item:last-child{border-bottom:none}
.hist-meta{font-size:10px;color:var(--hi);margin-bottom:2px}
.hist-text{font-size:12px;line-height:1.5}

.cc-split{display:grid;grid-template-columns:1fr 120px;gap:12px;align-items:start}
.cc-monthly{flex:1}
.cc-total{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:10px}
.cc-total-title{font-size:11px;font-weight:700;color:var(--tx);margin-bottom:1px}
.cc-total-sub{font-size:10px;color:var(--mu);margin-bottom:6px}
.cc-total-w{position:relative;height:160px}

/* CHART GRID 2-column */
.charts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.charts-grid .cc{cursor:pointer;transition:box-shadow .15s,border-color .15s}
.charts-grid .cc:hover{box-shadow:0 4px 18px rgba(0,0,0,.13);border-color:var(--bl-lt)}
/* TwoBar split cards span both columns */
.cc-span2{grid-column:1/-1}
.cc-clickhint{font-size:9px;color:var(--hi);margin-top:3px;font-style:italic}

/* DRILL-DOWN MODAL */
.drill-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;
  display:flex;align-items:center;justify-content:center;padding:16px}
.drill-box{background:var(--sf);border-radius:var(--rl);width:min(900px,98vw);
  max-height:92vh;display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 24px 64px rgba(0,0,0,.28)}
.drill-hd{padding:13px 18px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.drill-hd-t{font-weight:700;font-size:15px}
.drill-hd-r{display:flex;gap:8px;align-items:center}
.drill-exp{padding:5px 13px;border-radius:var(--r);border:1px solid var(--bd2);
  background:var(--sf);color:var(--mu);font-size:11px;cursor:pointer}
.drill-exp:hover{background:var(--bl);color:#fff;border-color:var(--bl)}
.drill-cls{border:none;background:none;font-size:22px;color:var(--mu);cursor:pointer;
  padding:0 4px;line-height:1}
.drill-cls:hover{color:var(--tx)}
.drill-bd{flex:1;overflow-y:auto;padding:20px 22px}
.drill-cw{position:relative;height:380px}

/* PURPOSE line under dept name in left panel */
.dept-purpose{font-size:13px;color:var(--tx);margin-bottom:10px;
  font-style:italic;line-height:1.4;padding:5px 8px;background:var(--sf2);
  border-radius:var(--r);border-left:3px solid var(--bl)}

/* ── Message button unread badge ── */
.msg-unread-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:16px;height:16px;padding:0 4px;
  background:var(--rd);color:#fff;border-radius:8px;
  font-size:10px;font-weight:700;margin-left:5px;
  animation:pulse-red 2s ease-in-out infinite;
}
@keyframes pulse-red{
  0%,100%{transform:scale(1);opacity:1;}
  50%{transform:scale(1.15);opacity:.85;}
}
/* topbar msg indicator */
#topbar-msg-dot{
  width:8px;height:8px;border-radius:50%;background:var(--rd);
  display:none;margin-right:2px;
  animation:pulse-red 2s ease-in-out infinite;
}

/* ── Sticky period/chart-range sections ── */
.lp-sticky{position:sticky;top:0;z-index:10;background:var(--sf);
  padding:12px 13px 8px 13px;border-bottom:1px solid var(--bd)}
/* BOD period selector */
.bod-period-box{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);
  padding:9px 11px;margin-bottom:8px}
.bod-period-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.bod-period-label{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.7px;color:var(--hi);margin-bottom:4px}
/* Drill modal legend */
.drill-legend-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.drill-leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--mu)}
.drill-leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.drill-leg-line{width:14px;height:3px;border-radius:2px;flex-shrink:0}

/* ── Notification dropdown (topbar unread dot) ── */
.notif-wrap{position:relative;display:inline-flex;align-items:center}
.notif-btn{border:none;background:none;cursor:pointer;padding:2px 4px;
  display:inline-flex;align-items:center;gap:3px}
.notif-count{font-size:10px;font-weight:700;color:var(--rd);
  background:var(--rd-bg);padding:0 5px;border-radius:8px;
  animation:pulse-red 2s ease-in-out infinite;min-width:18px;text-align:center}
.notif-panel{position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);
  box-shadow:0 8px 24px rgba(0,0,0,.15);min-width:240px;z-index:200;
  display:none;flex-direction:column;overflow:hidden}
.notif-panel.open{display:flex}
.notif-head{padding:9px 14px;font-size:11px;font-weight:700;color:var(--mu);
  text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--bd)}
.notif-item{display:flex;align-items:center;gap:9px;padding:8px 14px;
  cursor:pointer;transition:background .12s;border-bottom:1px solid var(--bd)}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:var(--bl-bg)}
.notif-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.notif-info{flex:1;min-width:0}
.notif-dept{font-size:12px;font-weight:600;color:var(--tx)}
.notif-cnt{font-size:10px;color:var(--rd);font-weight:600}
.notif-empty{padding:14px;font-size:12px;color:var(--hi);text-align:center}
</style>

var WL_CACHE = null; // cached whitelist array

// Fetch Whitelist from Sheet CSV (CORS-free, same as KPI data)
function fetchWhitelist(cb){
  if(WL_CACHE){if(cb)cb(WL_CACHE);return;}
  // If WL_SHEET_GID set → read from CSV; else call GAS endpoint
  if(WL_SHEET_GID){
    var url='https://docs.google.com/spreadsheets/d/'+SHEET_ID
      +'/export?format=csv&gid='+WL_SHEET_GID+'&t='+Date.now();
    fetch(url)
      .then(function(r){return r.text();})
      .then(function(csv){
        var rows=parseCSV(csv);
        WL_CACHE=[];
        for(var i=1;i<rows.length;i++){
          var r=rows[i];
          if(!r[0])continue;
          WL_CACHE.push({
            email: r[0].trim().toLowerCase(),
            role:  r[1]||'dept', dept:r[2]||'',
            name:  r[3]||r[0],   color:r[4]||'#378ADD'
          });
        }
        if(cb)cb(WL_CACHE);
      })
      .catch(function(){if(cb)cb([]);});
  } else {
    // Fallback: call GAS action=getWhitelist
    fetch(SCRIPT_URL+'?action=getWhitelist&t='+Date.now())
      .then(function(r){return r.text();})
      .then(function(text){
        try{
          var d=JSON.parse(text);
          WL_CACHE=Array.isArray(d)?d:[];
        }catch(e){WL_CACHE=[];}
        if(cb)cb(WL_CACHE);
      })
      .catch(function(){if(cb)cb([]);});
  }
}

function lookupByEmail(email){
  var e=(email||'').toLowerCase().trim();
  if(!WL_CACHE)return null;
  return WL_CACHE.find(function(u){return u.email===e;})||null;
}

// Decode Google JWT to get email (no crypto needed — browser just received it from Google)
function decodeGoogleJWT(token){
  try{
    var base64=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    return JSON.parse(decodeURIComponent(atob(base64).split('').map(function(c){
      return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);
    }).join('')));
  }catch(e){return null;}
}

// ── Called by Google Sign-In button ──
// ── Shared payload handler — dùng cho cả GIS button lẫn OAuth2 token flow ──
function handleGooglePayload(payload){
  if(!payload||!payload.email){
    showLoginErr('Invalid Google token. Please try again.');
    return;
  }
  el('l-loading').style.display='block';
  el('l-err').style.display='none';
  fetchWhitelist(function(wl){
    el('l-loading').style.display='none';
    var entry=lookupByEmail(payload.email);
    if(!entry){
      showLoginErr('Access denied. Your Gmail ('+payload.email+') is not in the authorised list. Contact admin.');
      return;
    }
    var u=payload.email.split('@')[0].replace(/[^a-z0-9]/g,'_');
    U={username:u, email:payload.email,
       role:entry.role, dept:entry.dept||null,
       name:entry.name, color:entry.color, ini:''};
    startApp();
  });
}

// ── GIS One-Tap callback (first-time login, no signout flag) ──
function handleGoogleSignIn(response){
  var payload=decodeGoogleJWT(response.credential);
  handleGooglePayload(payload);
}

// Returns latest note text for dept/year/month_0idx/kpi_key (null if none)
// kpi_key='' means dept-level monthly note; kpi_key='Orders_Booked_USD' = per-KPI note
function getNote(dept,year,m0,kpi_key){
  var key=kpi_key||'';
  var found=null;
  for(var i=0;i<NOTES_DATA.length;i++){
    var n=NOTES_DATA[i];
    if(n.dept===dept&&(n.month-1)===m0&&n.year===year&&(n.kpi_key||'')===key) found=n;
  }
  return found?found.note:null;
}

function saveNote(dept,month1,year,kpi_key,noteText){
  if(!SCRIPT_URL)return;
  var params='action=saveNote'
    +'&dept='+encodeURIComponent(dept)
    +'&month='+encodeURIComponent(month1)
    +'&year='+encodeURIComponent(year)
    +'&kpi_key='+encodeURIComponent(kpi_key||'')
    +'&note='+encodeURIComponent(noteText)
    +'&submitted_by='+encodeURIComponent(U?U.username:'')
    +'&t='+Date.now();
  var beacon=new Image();
  beacon.src=SCRIPT_URL+'?'+params;
  // Optimistic local update
  // Remove old entry for same key first, then push new
  NOTES_DATA=NOTES_DATA.filter(function(n){
    return!(n.dept===dept&&(n.month-1)===(month1-1)&&n.year===year&&(n.kpi_key||'')===(kpi_key||''));
  });
  NOTES_DATA.push({dept:dept,month:month1,year:year,kpi_key:kpi_key||'',note:noteText,
    submitted_by:U?U.username:'',submitted_at:new Date().toLocaleString()});
}

function parseCSV(text){
  var rows=[], cur=[], field='', inQ=false;
  for(var i=0;i<text.length;i++){
    var ch=text[i];
    if(inQ){
      if(ch==='"'&&text[i+1]==='"'){field+='"';i++;}
      else if(ch==='"'){inQ=false;}
      else field+=ch;
    } else {
      if(ch==='"'){inQ=true;}
      else if(ch===','){cur.push(field.trim());field='';}
      else if(ch==='\n'||(ch==='\r'&&text[i+1]==='\n')){
        if(ch==='\r')i++;
        cur.push(field.trim());field='';rows.push(cur);cur=[];
      } else field+=ch;
    }
  }
  if(field||cur.length)cur.push(field.trim());
  if(cur.length>1||cur[0])rows.push(cur);
  return rows;
}

function setSyncBadge(state, count){
  var b = el('sync-badge');
  if(!b) return;
  if(state==='loading') { b.textContent='● Syncing…'; b.style.color='var(--am)'; }
  else if(state==='ok')  { b.textContent='● Live · '+count+' rows'; b.style.color='var(--hi)'; }
  else if(state==='err') { b.textContent='● No data'; b.style.color='var(--rd)'; }
  else                   { b.textContent='● Offline'; b.style.color='var(--hi)'; }
}

// DATA ACCESS
// FIX #4: Google Sheet stores month as 1-12 (Jan=1).
//         JS code uses 0-indexed months (Jan=0).
//         Fix: sheet_month - 1 === code_month
// ═══════════════════════════════════════════════
function getGSRow(dept, year, month_0idx){
  // Returns LAST (latest revision) row for dept/year/month
  var found=null;
  for(var i=0;i<GS_DATA.length;i++){
    var r=GS_DATA[i];
    if(r[0]===dept&&(parseInt(r[1])-1)===month_0idx&&parseInt(r[2])===year)
      found=r;
  }
  return found;
}
function getRevisionCount(dept,year,m0){
  var n=0;
  for(var i=0;i<GS_DATA.length;i++){
    var r=GS_DATA[i];
    if(r[0]===dept&&(parseInt(r[1])-1)===m0&&parseInt(r[2])===year)n++;
  }
  return n;
}
function ordinal(n){
  var s=['th','st','nd','rd'],v=n%100;
  return n+(s[(v-20)%10]||s[v]||s[0]);
}

function getGSVal(dept, year, month_0idx, key){
  var ki = GS_HDR.indexOf(key);
  if(ki<0) return null;
  var r = getGSRow(dept, year, month_0idx);
  if(!r) return null;
  var v = r[ki];
  if(v===''||v===undefined||v===null) return null;
  var n = parseFloat(v);
  // FIX #1: round to 4 decimal places to eliminate floating-point noise
  return isNaN(n) ? v : Math.round(n * 10000) / 10000;
}

// FIX #5: find the latest month/year that has data for a dept
function getLastDataMonth(deptId){
  var latest = null;
  for(var i=0;i<GS_DATA.length;i++){
    var r=GS_DATA[i];
    if(r[0]===deptId){
      var y=parseInt(r[2]);
      var m=parseInt(r[1]); // 1-indexed from sheet
      if(!latest || y>latest.y || (y===latest.y && m>latest.m))
        latest={y:y,m:m};
    }
  }
  return latest; // {y, m} where m is 1-indexed (1=Jan)
}

function saveDept(){
  var dept=DEPTS.find(function(d){return d.id===deptId;});
  var sp=el('sv-sp'),lb=el('sv-lb'),ok=el('sv-ok'),er=el('sv-er');
  if(!sp)return;
  sp.style.display='inline-block'; lb.textContent='Saving…';
  ok.style.display='none'; er.style.display='none';
  var payload={dept:deptId, month:selM+1, year:selY, // month+1 for sheet (1-indexed)
    submitted_by:U.username, comment:el('ki-cmt').value||''};
  dept.kpis.forEach(function(k){
    var inp=el('ki-'+k.k);
    if(inp&&inp.value!=='')payload[k.k]=parseFloat(inp.value);
  });
  if(!SCRIPT_URL){
    // Demo: update local GS_DATA so chart updates immediately
    var newRow=GS_HDR.map(function(h){
      if(h==='dept')return deptId;
      if(h==='month')return String(selM+1);
      if(h==='year')return String(selY);
      if(h==='submitted_at')return new Date().toLocaleString();
      if(h==='submitted_by')return U.username;
      return payload[h]!=null?String(payload[h]):'';
    });
    GS_DATA.push(newRow);
    saveAllNotesFromForm(); // V37: save notes locally too
    delete UNLOCKED[deptId+'_'+selY+'_'+selM];
    sp.style.display='none'; lb.textContent='💾 Save KPIs & Notes';
    ok.style.display='block';
    var badge=el('st-badge');if(badge){badge.textContent='Submitted';badge.className='badge bg';}
    buildDeptLeft();
    renderDeptRight();
    setTimeout(function(){ok.style.display='none';},3000);
    return;
  }
  // Send KPI to GAS via Image beacon
  var params='action=saveKPI';
  Object.keys(payload).forEach(function(k){
    params+='&'+encodeURIComponent(k)+'='+encodeURIComponent(payload[k]!=null?payload[k]:'');
  });

  // V37: Also save all notes (separate beacons, fire-and-forget)
  saveAllNotesFromForm();

  // Update UI locally immediately (optimistic update)
  var newRow=GS_HDR.map(function(h){
    if(h==='dept')return deptId;
    if(h==='month')return String(selM+1);
    if(h==='year')return String(selY);
    if(h==='submitted_at')return new Date().toLocaleString();
    if(h==='submitted_by')return U.username;
    return payload[h]!=null?String(payload[h]):'';
  });
  GS_DATA.push(newRow);
  delete UNLOCKED[deptId+'_'+selY+'_'+selM];
  sp.style.display='none'; lb.textContent='💾 Save KPIs & Notes';
  ok.textContent='✓ Saved to Google Sheets';
  ok.style.display='block';
  var badge=el('st-badge');if(badge){badge.textContent='Submitted';badge.className='badge bg';}
  buildDeptLeft(); renderDeptRight();
  setTimeout(function(){ok.style.display='none';},3000);

  // Fire-and-forget KPI beacon
  var beacon=new Image();
  beacon.src=SCRIPT_URL+'?'+params+'&t='+Date.now();
}

  if(dept.overlayCharts){
    // twoBar charts (full-width) come first, single charts fill 2-col grid after
    var sortedOC = dept.overlayCharts.slice().sort(function(a,b){
      var aTwo = a.datasets.length===2&&a.datasets[0].type==='bar'&&a.datasets[1].type==='bar';
      var bTwo = b.datasets.length===2&&b.datasets[0].type==='bar'&&b.datasets[1].type==='bar';
      return (bTwo?1:0)-(aTwo?1:0);
    });
    sortedOC.forEach(function(oc,i){
      renderOverlayChart(col,'d_oc_'+i,oc,range,deptId,true);
    });

        +'<div class="cc-clickhint">Click to expand</div>'
        +'<div class="cc-w"><canvas id="'+cid+'"></canvas></div>';
      col.appendChild(div);
      CH[cid]=mkLine(cid,range.labels,kpi.l,vals,dept.color,kpi.u,buildNoteMap(deptId,range,kpi.k));
    });
  }
}

// shared overlay chart renderer
function renderOverlayChart(col, cid, oc, range, did, gridMode){
  var isMulti=oc.datasets.length>1;
  var legendHtml=isMulti?'<div class="legend">'+oc.datasets.map(function(ds){
    return '<div class="legend-item"><span class="legend-dot" style="background:'+ds.color+'"></span>'+ds.label+'</div>';
  }).join('')+'</div>':'';
  var isTwoBarCheck=oc.datasets.length===2&&oc.datasets[0].type==='bar'&&oc.datasets[1].type==='bar';
  // Outer wrapper: for twoBar charts use split layout (monthly | total)
  var wrapper=document.createElement('div');
  // TwoBar split cards need full-width to keep monthly+total side-by-side
  wrapper.className='cc'+(isTwoBarCheck?' cc-span2':'');
  wrapper.dataset.chartId=cid;wrapper.dataset.chartTitle=oc.title;wrapper.dataset.chartSub=rangeLabel(range);
  var clickHint=gridMode?'<div class="cc-clickhint">Click to expand</div>':'';
  if(isTwoBarCheck){
    wrapper.innerHTML='<div class="cc-t">'+oc.title+'</div>'
      +'<div class="cc-s">'+rangeLabel(range)+'</div>'
      +clickHint+legendHtml
      +'<div class="cc-split">'
      +'<div class="cc-monthly"><div class="cc-w tall"><canvas id="'+cid+'"></canvas></div></div>'
      +'<div class="cc-total" id="'+cid+'-tot-card">'
      +'<div class="cc-total-title">Total</div>'
      +'<div class="cc-total-sub">'+rangeLabel(range)+'</div>'
      +'<div class="cc-total-w"><canvas id="'+cid+'-tot"></canvas></div>'
      +'</div></div>';
  } else {
    wrapper.innerHTML='<div class="cc-t">'+oc.title+'</div>'
      +'<div class="cc-s">'+rangeLabel(range)+'</div>'
      +clickHint+legendHtml
      +'<div class="cc-w'+(isMulti?' tall':'')+'"><canvas id="'+cid+'"></canvas></div>';
  }
  var div=wrapper;
  col.appendChild(div);
  var many=range.labels.length>24;
  var isTwoBar=oc.datasets.length===2&&oc.datasets[0].type==='bar'&&oc.datasets[1].type==='bar';
  var datasets=oc.datasets.map(function(ds){
    var vals=range.dkeys.map(function(dk){return getGSVal(did,dk.y,dk.m,ds.key);});
    var base={label:ds.label,data:vals,borderColor:ds.color,
      backgroundColor:ds.color+(ds.type==='bar'?'dd':'40'),
      tension:.3,fill:ds.type!=='bar',
      pointRadius:many?2:4,borderWidth:ds.type==='bar'?1:2,
      pointBackgroundColor:ds.color,spanGaps:true,yAxisID:'y'};
    if(ds.type==='bar'){base.type='bar';base.borderRadius=3;}
    return base;
  });
  if(isTwoBar){
    var va=range.dkeys.map(function(dk){return getGSVal(did,dk.y,dk.m,oc.datasets[0].key);});
    var vb=range.dkeys.map(function(dk){return getGSVal(did,dk.y,dk.m,oc.datasets[1].key);});
    var rv=va.map(function(a,i){return a&&vb[i]?Math.round(vb[i]/a*1000)/10:null;});
    datasets.push({type:'line',label:'Ratio %',data:rv,
      borderColor:'#6366F1',backgroundColor:'transparent',
      tension:.3,fill:false,pointRadius:many?2:3,
      pointBackgroundColor:'#6366F1',spanGaps:true,yAxisID:'y2',borderDash:[4,3]});
    var lw=div.querySelector('.legend');
    if(lw)lw.innerHTML+='<div class="legend-item"><span class="legend-dot" style="background:#6366F1;border-radius:50%"></span>Ratio %</div>';
  }
  var opts=chartOpts(oc.unit||'');
  // V37: KPI note key — single-dataset charts use their kpi key; twoBar uses '' (monthly only)
  var _noteKpiKey = (!isTwoBar && oc.datasets.length===1) ? oc.datasets[0].key : '';
  if(isTwoBar){opts.scales.y2={type:'linear',position:'right',
    grid:{drawOnChartArea:false},
    ticks:{font:{size:10},color:'#6366F1',callback:function(v){return v+'%';}},
    title:{display:true,text:'Ratio %',color:'#6366F1',font:{size:10,weight:'600'}}};
    // FIX V35: Ratio % tooltip was showing "$37" instead of "37%" because chartOpts
    // uses the chart's unit (USD) for all datasets. Override to detect Ratio % series.
    var _origLbl=opts.plugins.tooltip.callbacks.label;
    opts.plugins.tooltip.callbacks.label=function(ctx){
      if(ctx.dataset.label==='Ratio %'){
        var v=ctx.raw;if(v==null)return'No data';
        return'Ratio: '+(Math.round(v*10)/10)+'%';
      }
      return _origLbl(ctx);
    };
  }
  // V37: tooltip shows KPI note + Monthly Note, with line breaks
  var _noteMap=buildNoteMap(did,range,_noteKpiKey);
  opts.plugins.tooltip.callbacks.afterBody=function(items){
    var lbl=items[0]&&items[0].label;
    var lines=_noteMap[lbl];
    if(lines&&lines.length)return[''].concat(lines);
    return[];
  };
  opts.plugins.datalabels={
    display:function(ctx){
      if(many)return false;
      // Hide Ratio % line labels (too cluttered alongside bars)
      if(ctx.dataset.label==='Ratio %')return false;
      // Show on both bar and line datasets
      return true;
    },
    color:function(ctx){
      if(ctx.dataset.type==='bar')return'#333';
      return ctx.dataset.borderColor||'#555';
    },
    anchor:'end',align:'top',font:{size:9,weight:'600'},
    formatter:function(v){
      if(v==null)return null;
      if(oc.unit==='%')return(Math.round(v*10)/10)+'%';
      if(oc.unit==='Days'||oc.unit==='days'||oc.unit==='rate')return(Math.round(v*100)/100);
      if(oc.unit==='USD')return v>=1e6?(Math.round(v/1e5)/10)+'M':v>=1000?Math.round(v/1000)+'k':'$'+Math.round(v);
      return Math.round(v);
    }
  };
  CH[cid]=new Chart(document.getElementById(cid),{
    type:'bar',
    data:{labels:range.labels,datasets:datasets},
    options:opts,plugins:[ChartDataLabels]
  });
  // ── Summary total chart (right side) for two-bar plan/actual charts ──
  if(isTwoBar&&document.getElementById(cid+'-tot')){
    var totA=va.reduce(function(s,v){return s+(v||0);},0);
    var totB=vb.reduce(function(s,v){return s+(v||0);},0);
    var totRatio=totA?Math.round(totB/totA*1000)/10:null;
    var totLabel0=oc.datasets[0].label, totLabel1=oc.datasets[1].label;
    var totColor0=oc.datasets[0].color, totColor1=oc.datasets[1].color;
    var totOpts={
      responsive:true,maintainAspectRatio:false,
      layout:{padding:{top:18}},
      plugins:{
        legend:{display:false},
        datalabels:{
          display:true,color:'#333',anchor:'end',align:'top',
          font:{size:9,weight:'700'},
          formatter:function(v){
            if(v==null)return null;
            if(oc.unit==='USD')return v>=1e6?(Math.round(v/1e5)/10)+'M':v>=1000?Math.round(v/1000)+'k':'';
            return Math.round(v);
          }
        }
      },
      scales:{
        y:{display:false,beginAtZero:true},
        x:{grid:{display:false},ticks:{font:{size:9}}}
      }
    };
    CH[cid+'-tot']=new Chart(document.getElementById(cid+'-tot'),{
      type:'bar',
      data:{
        labels:[totLabel0,totLabel1],
        datasets:[{
          data:[totA,totB],
          backgroundColor:[totColor0+'bb',totColor1+'bb'],
          borderColor:[totColor0,totColor1],
          borderWidth:1,borderRadius:4
        }]
      },
      options:totOpts,
      plugins:[ChartDataLabels]
    });
    // Show ratio below total chart
    if(totRatio!==null){
      var totCard=document.getElementById(cid+'-tot-card');
      if(totCard){
        var ratioEl=document.createElement('div');
        ratioEl.style.cssText='margin-top:6px;text-align:center;font-size:11px;font-weight:700;color:#6366F1';
        ratioEl.textContent='Ratio: '+totRatio+'%';
        totCard.appendChild(ratioEl);
      }
    }
  }
}

function buildAccBody(dept){
  // Use BOD selected period
  var curM0=selBodM; var curY=selBodY;
  var prevM0=curM0===0?11:curM0-1;
  var prevY=curM0===0?curY-1:curY;
  var row=getGSRow(dept.id,curY,curM0);
  if(!row){
    // Fall back to latest available
    var lastDM=getLastDataMonth(dept.id);
    if(!lastDM){
      return '<div style="font-size:12px;color:var(--hi);padding:4px 0">No data for '+MN[curM0]+' '+curY+'.</div>'
        +'<button class="vc-btn" data-dept="'+dept.id+'">View all charts →</button>';
    }
    curM0=lastDM.m-1; curY=lastDM.y;
    prevM0=curM0===0?11:curM0-1; prevY=curM0===0?curY-1:curY;
    row=getGSRow(dept.id,curY,curM0);
  }
  var prevRow=getGSRow(dept.id,prevY,prevM0);
  var revCount=getRevisionCount(dept.id,curY,curM0);
  var revBadge=revCount>1?'<span style="font-size:10px;font-weight:600;padding:1px 5px;background:var(--bl-bg);color:var(--bl);border-radius:5px;margin-left:5px">'+ordinal(revCount)+'</span>':'';
  var rows=dept.kpis.map(function(k){
    var v=getGSVal(dept.id,curY,curM0,k.k);
    var pv=prevRow?getGSVal(dept.id,prevY,prevM0,k.k):null;
    var dlt='',dc='dn';
    if(v!=null&&pv!=null&&pv!==0){
      var p=((v-pv)/Math.abs(pv)*100);
      dlt=(p>=0?'▲':'▼')+Math.abs(p).toFixed(1)+'%';
      var isUp=(p>=0);
      var betterUp=(k.better!=='down');
      dc=(isUp===betterUp)?'du':'dd';
    }

// ── Status helper ─────────────────────────────────────────────────
// Submitted  = row exists AND all KPI fields filled
// Pending    = row exists BUT some KPI fields missing
// Not updated = no row at all
function getDeptStatus(dept, year, month_0idx){
  var r = getGSRow(dept.id, year, month_0idx);
  if(!r) return 'none';
  var filled = dept.kpis.filter(function(k){
    return getGSVal(dept.id, year, month_0idx, k.k) != null;
  }).length;
  if(filled === dept.kpis.length) return 'full';
  return 'partial';
}

// Last submitted_at = latest across ALL rows for this dept this month
function getLastSubmittedAt(dept, year, month_0idx){
  var latest = null;
  for(var i=0;i<GS_DATA.length;i++){
    var r=GS_DATA[i];
    if(r[0]===dept.id&&(parseInt(r[1])-1)===month_0idx&&parseInt(r[2])===year){
      var idx=GS_HDR.indexOf('submitted_at');
      if(idx>=0&&r[idx]) latest=r[idx];
    }
  }
  return latest||'—';
}

// HELPERS
// ═══════════════════════════════════════════════
function buildRange(did){
  var labels=[],dkeys=[];
  var cy=drF.y,cm=drF.m;
  while(cy<drT.y||(cy===drT.y&&cm<=drT.m)){
    labels.push(MN[cm]+' '+cy);
    dkeys.push({dept:did,y:cy,m:cm}); // m is 0-indexed
    cm++; if(cm>11){cm=0;cy++;} if(labels.length>60)break;
  }
  return{labels:labels,dkeys:dkeys};
}
function rangeLabel(range){
  if(!range.labels.length)return'';
  return range.labels[0]+(range.labels.length>1?' → '+range.labels[range.labels.length-1]:'');
}
function killCharts(pfx){
  Object.keys(CH).filter(function(k){return k.indexOf(pfx)===0;})
    .forEach(function(k){try{CH[k].destroy();}catch(e){}delete CH[k];});
}

// FIX #1: fmtV rounds to 1 decimal for percentages, no float noise
function fmtV(v,k){
  if(v==null)return'—';
  if(k.t==='c')return'$'+Number(Math.round(v)).toLocaleString();
  if(k.t==='p')return(Math.round(v*10)/10)+(k.u==='%'?'%':'');
  return String(Math.round(v));
}

function chartOpts(unit){
  return{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){
      var v=ctx.raw;if(v==null)return'No data';
      // FIX #1: round tooltip values
      if(unit==='%')return(Math.round(v*10)/10)+'%';
      if(unit==='USD')return'$'+Math.round(v).toLocaleString();
      if(unit==='hrs'||unit==='count'||unit==='cnt'||unit==='ppl')return Math.round(v).toLocaleString();
      return(Math.round(v*100)/100).toString();
    }}}},
    layout:{padding:{top:20}},
    scales:{
      y:{beginAtZero:false,grid:{color:'rgba(0,0,0,.05)'},
         afterDataLimits:function(axis){
           var range=axis.max-axis.min;
           var isCountUnit=unit==='count'||unit==='cnt'||unit==='ppl'||unit==='No.'||unit==='Rate';
           // Pad TOP by 15% so datalabels above tallest bar are not clipped
           axis.max=axis.max+range*0.15;
           // Bottom padding
           if(isCountUnit){axis.min=0;return;}
           if(axis.min>0)axis.min=Math.max(0,axis.min-range*0.10);
           else axis.min=axis.min-Math.abs(axis.min)*0.10;
         },
         ticks:{font:{size:10},callback:function(v){
           if(unit==='%')return(Math.round(v*10)/10)+'%';
           if(unit==='USD')return v>=1e6?(Math.round(v/1e5)/10)+'M':v>=1000?Math.round(v/1000)+'k':'$'+Math.round(v);
           if(unit==='hrs'||unit==='count'||unit==='cnt'||unit==='ppl')return Math.round(v).toLocaleString();
           return Math.round(v*100)/100;
         }}},
      x:{grid:{display:false},ticks:{font:{size:10},maxRotation:45,
         autoSkip:true,maxTicksLimit:14}}
    }
  };
}

function mkLine(id,labels,label,data,color,unit,noteMap){
  var many=labels.length>24;
  var opts=chartOpts(unit);
  // V37: show KPI note + Monthly Note in tooltip
  if(noteMap){
    opts.plugins.tooltip.callbacks.afterBody=function(items){
      var lbl=items[0]&&items[0].label;
      var lines=noteMap[lbl];
      if(lines&&lines.length)return[''].concat(lines);
      return[];
    };
  }
  opts.plugins.datalabels={
    display:!many,color:color,anchor:'end',align:'top',
    font:{size:9,weight:'600'},
    formatter:function(v){
      if(v==null)return null;
      if(unit==='%')return(Math.round(v*10)/10)+'%';
      if(unit==='Days'||unit==='days')return(Math.round(v*10)/10);
      if(unit==='USD')return v>=1e6?(Math.round(v/1e5)/10)+'M':v>=1000?Math.round(v/1000)+'k':'';
      return Math.round(v);
    }
  };
  return new Chart(document.getElementById(id),{
    type:'line',
    data:{labels:labels,datasets:[{label:label,data:data,
      borderColor:color,backgroundColor:color+'40',tension:.3,fill:true,
      borderWidth:2,
      pointRadius:many?2:4,pointBackgroundColor:color,
      pointBorderColor:color,pointBorderWidth:2,
      spanGaps:true}]},
    options:opts,plugins:[ChartDataLabels]
  });
}

// MESSAGING — BOD <-> Dept 2-way communication
// ═══════════════════════════════════════════════
var msgDeptTarget=null;
function getMsgs(){try{var r=localStorage.getItem('cmi_msgs');return r?JSON.parse(r):[];}catch(e){return[];}}
function saveMsgsLocal(m){try{localStorage.setItem('cmi_msgs',JSON.stringify(m));}catch(e){}}
// ── Read-status stored separately so poll never wipes it ──
function getReadStore(){
  try{var r=localStorage.getItem('cmi_read_'+((U&&U.username)||''));return r?JSON.parse(r):{};
  }catch(e){return {};}
}
function saveReadStore(store){
  try{localStorage.setItem('cmi_read_'+((U&&U.username)||''),JSON.stringify(store));}catch(e){}
}
function markMsgRead(msgId){
  var s=getReadStore(); s[String(msgId)]=true; saveReadStore(s);
}
function isMsgRead(msgId){
  return !!getReadStore()[String(msgId)];
}

function getUnreadCount(deptId){
  var msgs=getMsgs();
  return msgs.filter(function(m){
    var mine=(U&&U.role==='dept'&&m.dept===deptId&&m.fromRole!=='dept')
            ||(U&&(U.role==='bod'||U.role==='admin')&&m.dept===deptId&&m.fromRole==='dept');
    return mine && !isMsgRead(m.id);
  }).length;
}
function getDeptUnreadBadge(deptId){
  var n=getUnreadCount(deptId);
  return n>0?'<span class="unread-dot" title="'+n+' unread"></span>':'';
}
var MSG_POLL_TIMER    = null;   // active when panel is open
var MSG_BG_TIMER      = null;   // background unread-dot refresh (60s)
var KPI_REFRESH_TIMER = null;   // auto-refresh KPI data every 2 min

// ── Background poll: refresh unread counts silently ──
function startMsgBackgroundPoll(){
  if(MSG_BG_TIMER) clearInterval(MSG_BG_TIMER);
  MSG_BG_TIMER = setInterval(function(){
    if(!U) return;
    // Dept users only need their dept msgs; bod/admin see all
    var pollDept=(U&&U.role==='dept')?U.dept:'';
    loadMsgsFromGAS(pollDept, function(){ updateUnreadUI(); });
  }, 60000);
  // Auto-refresh KPI data every 2 minutes silently
  if(KPI_REFRESH_TIMER) clearInterval(KPI_REFRESH_TIMER);
  KPI_REFRESH_TIMER = setInterval(function(){
    if(!U) return;
    fetchSheetData(function(){
      // Only re-render if BOD is viewing a dept (not overview)
      if((U.role==='bod'||U.role==='admin') && accOpen){
        buildbodLeft(); renderbodRight(accOpen);
      }
      setSyncBadge('ok', GS_DATA.length);
    });
  }, 120000); // every 2 minutes
}

function stopMsgBackgroundPoll(){
  if(MSG_BG_TIMER){clearInterval(MSG_BG_TIMER);MSG_BG_TIMER=null;}
}

// ── Update all unread indicators in the UI ──
function updateUnreadUI(){
  var totalUnread = 0;
  // Dept role only sees their own dept; bod/admin see all
  var visibleDepts = (U&&U.role==='dept')
    ? DEPTS.filter(function(d){return d.id===U.dept;})
    : DEPTS.slice().sort(function(a,b){return a.name.localeCompare(b.name);});
  var sortedDepts = (U&&U.role==='dept') ? visibleDepts
    : visibleDepts; // already sorted above for bod
  sortedDepts.forEach(function(d){
    var n = getUnreadCount(d.id);
    totalUnread += n;
    // Update accordion badge (if visible)
    var nameEl = document.querySelector('#acc-'+d.id+' .ah-name');
    if(nameEl){
      // Remove old unread dot, re-add if needed
      var oldDot = nameEl.querySelector('.unread-dot');
      if(oldDot) oldDot.remove();
      if(n > 0){
        var dot = document.createElement('span');
        dot.className = 'unread-dot';
        dot.title = n+' unread';
        nameEl.appendChild(dot);
      }
    }
    // Update open msg button in rp-msg-btn-wrap if showing this dept
    if(msgDeptTarget === d.id){
      // panel is open for this dept — no need to show badge
    }
  });
  // Topbar notification button
  var notifBtn = el('notif-btn');
  var notifCount = el('notif-count');
  var notifList = el('notif-list');
  if(notifBtn) notifBtn.style.display = totalUnread > 0 ? 'inline-flex' : 'none';
  if(notifCount) notifCount.textContent = totalUnread;
  // Populate dropdown list
  if(notifList){
    // Sort alphabetically
    // Only show unread for depts the user can see
    var scanDepts = (U&&U.role==='dept') ? DEPTS.filter(function(d){return d.id===U.dept;}) : DEPTS;
    var unreadDepts = scanDepts.filter(function(d){return getUnreadCount(d.id)>0;})
                               .sort(function(a,b){return a.name.localeCompare(b.name);});
    if(!unreadDepts.length){
      notifList.innerHTML='<div class="notif-empty">No unread messages</div>';
    } else {
      notifList.innerHTML = unreadDepts.map(function(d){
        var n = getUnreadCount(d.id);
        return '<div class="notif-item" data-notif-dept="'+d.id+'" title="Open '+d.name+' messages">'
          +'<span class="notif-dot" style="background:'+d.color+'"></span>'
          +'<div class="notif-info">'
          +'<div class="notif-dept">'+d.name+'</div>'
          +'<div class="notif-cnt">'+n+' unread message'+(n>1?'s':'')+'</div>'
          +'</div></div>';
      }).join('');
    }
  }
  // Update Messages button badge in rp-msg-btn-wrap
  var openMsgBtn = document.querySelector('#rp-open-msg');
  if(openMsgBtn && openMsgBtn.dataset.dept){
    var deptUnread = getUnreadCount(openMsgBtn.dataset.dept);
    var existing = openMsgBtn.querySelector('.msg-unread-badge');
    if(deptUnread > 0){
      if(!existing){
        var badge = document.createElement('span');
        badge.className = 'msg-unread-badge';
        openMsgBtn.appendChild(badge);
      } else {
        existing.textContent = deptUnread > 1 ? deptUnread : '';
      }
    } else {
      if(existing) existing.remove();
    }
  }
}

function openMsgPanel(deptId){
  var dept=DEPTS.find(function(d){return d.id===deptId;});
  msgDeptTarget=deptId;
  el('msg-panel-title').textContent='\u{1F4AC} '+(dept?dept.name:deptId);
  el('msg-panel').classList.add('open');
  // Load from GAS first, render, mark read
  loadMsgsFromGAS(deptId, function(msgs){
    refreshMsgThread();
    markDeptRead(deptId);
  });
  // Poll every 15s while panel is open
  if(MSG_POLL_TIMER) clearInterval(MSG_POLL_TIMER);
  MSG_POLL_TIMER = setInterval(function(){
    if(!msgDeptTarget) return;
    loadMsgsFromGAS(msgDeptTarget, function(){
      refreshMsgThread();
      markDeptRead(msgDeptTarget); // mark newly arrived msgs as read too
    });
  }, 15000);
}

function markDeptRead(deptId){
  // Mark all messages for this dept as read in the separate read-store
  var msgs=getMsgs();
  msgs.forEach(function(m){
    if(m.dept===deptId) markMsgRead(m.id);
  });
  updateUnreadUI();
}
function closeMsgPanel(){
  el('msg-panel').classList.remove('open');
  msgDeptTarget=null;
  if(MSG_POLL_TIMER){clearInterval(MSG_POLL_TIMER);MSG_POLL_TIMER=null;}
}
function refreshMsgThread(){
  if(!msgDeptTarget)return;
  var msgs=getMsgs().filter(function(m){return m.dept===msgDeptTarget;});
  // Dept users: extra guard — only show their own dept messages
  if(U&&U.role==='dept') msgs=msgs.filter(function(m){return m.dept===U.dept;});
  // Admin cannot see BOD messages
  if(U&&U.role==='admin') msgs=msgs.filter(function(m){return m.fromRole!=='bod';});
  var thread=el('msg-thread');
  if(!msgs.length){thread.innerHTML='<div style="font-size:12px;color:var(--hi);text-align:center;padding:20px">No messages yet.</div>';return;}
  thread.innerHTML=msgs.map(function(m){
    // isMe: message sent by me
    // For dept user: their own messages have fromRole==='dept'
    // For BOD/admin: their own messages have fromRole!=='dept'
    // Also match by username or email for precision
    var isMe=U&&(
      m.from===U.username || m.from===U.email ||
      (U.role==='dept' && m.fromRole==='dept') ||
      ((U.role==='bod'||U.role==='admin') && (m.fromRole==='bod'||m.fromRole==='admin'))
    );
    return '<div style="display:flex;flex-direction:column;align-items:'+(isMe?'flex-end':'flex-start')+'">'
      +'<div class="msg-bubble '+(isMe?'msg-from-me':'msg-from-other')+'">'
      +esc(m.text)
      +'<div class="msg-meta">'+m.fromRole.toUpperCase()+(isMe?' (you)':' \u00b7 '+m.from)+' \u00b7 '+new Date(m.ts).toLocaleString()+'</div>'
      +'</div></div>';
  }).join('');
  thread.scrollTop=thread.scrollHeight;
  updateUnreadUI();
}
function sendMsg(){
  var inp=el('msg-txt-input');var text=(inp.value||'').trim();
  if(!text||!msgDeptTarget||!U)return;
  var msg={id:Date.now(),from:U.username,fromRole:U.role,dept:msgDeptTarget,
    text:text,ts:new Date().toISOString(),read:[U.username]};
  // Optimistic local update
  var msgs=getMsgs();msgs.push(msg);saveMsgsLocal(msgs);
  inp.value='';refreshMsgThread();
  // Save to GAS via beacon (CORS-free, fire-and-forget)
  var gasUrl = GAS_MSG_URL||SCRIPT_URL;
  if(gasUrl){
    var beacon=new Image();
    beacon.src=gasUrl
      +'?action=sendMsg'
      +'&id='+encodeURIComponent(msg.id)
      +'&from='+encodeURIComponent(msg.from)

// CHANGE PASSWORD
// Passwords are stored in localStorage so they
// persist across sessions on the same browser.
// Key: cmi_pw_[username]
// ═══════════════════════════════════════════════
function getPass(username){
  // Priority: localStorage (synced from GAS) → USERS default
  try{
    var stored=localStorage.getItem('cmi_pw_'+username);
    return stored||USERS[username].pass;
  }catch(e){ return USERS[username] ? USERS[username].pass : ''; }
}

    +'/export?format=csv&gid='+PW_SHEET_GID+'&t='+Date.now();
}

// Pull passwords from Sheet CSV → localStorage
function syncPasswordsFromGAS(cb){
  if(!PW_SHEET_GID){if(cb)cb();return;}
  fetch(getPwSheetUrl())
    .then(function(r){return r.text();})
    .then(function(csv){
      var rows=parseCSV(csv);
      // rows[0] = header: username,password,updated_at
      for(var i=1;i<rows.length;i++){
        var u=rows[i][0]&&rows[i][0].trim();
        var p=rows[i][1]&&rows[i][1].trim();
        if(u&&p){
          try{localStorage.setItem('cmi_pw_'+u,p);}catch(e){}
        }
      }
      if(cb)cb();
    })
    .catch(function(){if(cb)cb();});
}

// Write password to GAS via Image beacon — bypasses CORS completely
function pushPasswordToGAS(username, newPass, onDone, onFail){
  if(!GAS_PW_URL){if(onFail)onFail();return;}
  var beacon=new Image();
  beacon.onload=function(){if(onDone)onDone();};
  beacon.onerror=function(){if(onDone)onDone();}; // GAS returns HTML so img errors — still fired
  beacon.src=GAS_PW_URL
    +'?action=setPassword'
    +'&username='+encodeURIComponent(username)
    +'&password='+encodeURIComponent(newPass)
    +'&t='+Date.now();
  // Assume success after short delay since beacon gives no readable response
  setTimeout(function(){if(onDone)onDone();}, 2000);
}

var drillChart=null;
function openDrill(title, chartInstance, sub){
  if(!chartInstance) return;
  var ov=el('drill-ov');
  el('drill-title').textContent=title;
  if(el('drill-sub'))el('drill-sub').textContent=sub||'';

  if(chartInstance&&chartInstance.data&&chartInstance.data.datasets){
    var dsList=chartInstance.data.datasets.filter(function(ds){return ds.label;});
    if(dsList.length>1||chartInstance.config.type==='bar'){
      legHtml='<div class="drill-legend-row">'
        +dsList.map(function(ds){
          var isBar=ds.type==='bar'||chartInstance.config.type==='bar';
          var swatch=isBar
            ?'<span class="drill-leg-dot" style="background:'+(Array.isArray(ds.backgroundColor)?ds.backgroundColor[0]:ds.backgroundColor)+'"></span>'
            :'<span class="drill-leg-line" style="background:'+ds.borderColor+'"></span>';
          return '<div class="drill-leg-item">'+swatch+ds.label+'</div>';
        }).join('')
        +'</div>';
    }
  }
  el('drill-body').innerHTML=legHtml+'<div class="drill-cw"><canvas id="drill-canvas"></canvas></div>';
  ov.style.display='flex';
  // Clone chart config into drill canvas
  if(drillChart){try{drillChart.destroy();}catch(e){}}
  var src=chartInstance;
  var cfg={
    type:src.config.type,
    data:JSON.parse(JSON.stringify(src.config.data)),
    options:JSON.parse(JSON.stringify(src.config.options)),
    plugins:src.config.plugins
  };
  // Bigger fonts + restore afterDataLimits + layout padding for drill view
  if(!cfg.options.layout) cfg.options.layout={};
  cfg.options.layout.padding={top:20};
  if(cfg.options.scales){
    if(cfg.options.scales.x) cfg.options.scales.x.ticks={font:{size:11}};
    if(cfg.options.scales.y){
      cfg.options.scales.y.ticks={font:{size:11}};
      // Re-apply afterDataLimits (lost by JSON.parse — functions stripped)
      cfg.options.scales.y.afterDataLimits=function(axis){
        var range=axis.max-axis.min;
        axis.max=axis.max+range*0.15; // top pad
        if(axis.min>0)axis.min=Math.max(0,axis.min-range*0.10);
        // For zero-based charts keep min at 0
        if(axis.min<0)axis.min=0;
      };
    }
  }
  if(cfg.options.plugins&&cfg.options.plugins.datalabels){
    cfg.options.plugins.datalabels.font={size:11,weight:'700'};
  }
  drillChart=new Chart(el('drill-canvas'),cfg);
}

// ← Whitelist GID: GAS auto-creates this tab; find GID after first getWhitelist call

// ← Get from Google Cloud Console → APIs & Services → Credentials → OAuth 2.0 Client ID
var GOOGLE_CLIENT_ID = '562822497723-omjm4amq1ob2gpsfke8149ihgpqj0ujc.apps.googleusercontent.com'; // ← fill in
function getMsgSheetUrl(){
  return 'https://docs.google.com/spreadsheets/d/'+SHEET_ID
    +'/export?format=csv&gid='+MSG_SHEET_GID+'&t='+Date.now();
}
// ── loadMsgsFromGAS: read from Sheet CSV (CORS-free, same as KPI data) ──
// GAS fetch fails due to CORS (HtmlService). CSV export is always accessible.
// MSG_SHEET_GID points to the "Messages" tab auto-created by GAS on first send.
// Write path: sendMsg → image beacon → GAS (already working, messages appear in sheet).
function loadMsgsFromGAS(dept, cb){
  if(!MSG_SHEET_GID){
    // No sheet tab yet → use localStorage only
    var localAll=getMsgs();
    // Dept users should only see own dept
    if(U&&U.role==='dept') localAll=localAll.filter(function(m){return m.dept===U.dept;});
    if(cb) cb(dept ? localAll.filter(function(m){return m.dept===dept;}) : localAll);
    return;
  }
  var url = getMsgSheetUrl(); // CSV export URL, CORS-free
  fetch(url)
    .then(function(r){return r.text();})
    .then(function(csv){
      var rows = parseCSV(csv);
      // Header row: id,from,fromRole,dept,text,ts
      var sheetMsgs = [];
      for(var i=1;i<rows.length;i++){
        var r=rows[i];
        if(!r[0]||!r[4]) continue; // skip empty rows
        sheetMsgs.push({
          id:r[0], from:r[1]||'', fromRole:r[2]||'',
          dept:r[3]||'', text:r[4]||'', ts:r[5]||'', read:[]
        });
      }
      // Preserve local read-status
      var local = getMsgs();
      var localMap = {};
      local.forEach(function(m){ localMap[String(m.id)] = m; });
      sheetMsgs.forEach(function(m){
        var lm = localMap[String(m.id)];
        if(lm) m.read = lm.read || [];
      });
      // Keep locally-created msgs not yet on sheet (optimistic, just sent)
      var sheetIds = sheetMsgs.map(function(m){return String(m.id);});
      local.forEach(function(lm){
        if(sheetIds.indexOf(String(lm.id)) < 0) sheetMsgs.push(lm);
      });
      sheetMsgs.sort(function(a,b){return String(a.ts)<String(b.ts)?-1:1;});
      // Filter by dept if requested
      var result = dept ? sheetMsgs.filter(function(m){return m.dept===dept;}) : sheetMsgs;
      // For dept users: only cache own dept msgs to prevent cross-dept leakage
      var toCache = (U&&U.role==='dept') ? sheetMsgs.filter(function(m){return m.dept===U.dept;}) : sheetMsgs;
      saveMsgsLocal(toCache);
      if(cb) cb(result);
    })
    .catch(function(){
      // Sheet unavailable → fall back to localStorage
      var local = getMsgs();
      if(U&&U.role==='dept') local=local.filter(function(m){return m.dept===U.dept;});
      if(cb) cb(dept ? local.filter(function(m){return m.dept===dept;}) : local);
    });
}

}

document.addEventListener('DOMContentLoaded',function(){

  // ── 0. OAuth2 redirect callback ──
  // Chạy SYNCHRONOUSLY trước restoreSession.
  // Phải set OAUTH_HANDLING=true và xóa cmi_so TRƯỚC khi fetch (async).
  // Nếu không, restoreSession chạy song song sẽ đọc cmi_so=1 và gọi initGoogleSignIn.
  (function handleOAuthCallback(){
    var hash = window.location.hash;
    if(!hash || hash.indexOf('access_token')<0) return;
    // Parse hash
    var params={};
    hash.replace(/^#/,'').split('&').forEach(function(p){
      var kv=p.split('='); if(kv[0]) params[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||'');
    });
    if(!params.access_token) return;
    // ── SYNCHRONOUS ACTIONS (trước khi bất kỳ async nào chạy) ──
    OAUTH_HANDLING = true;                      // ngăn restoreSession chạy
    localStorage.removeItem('cmi_so');          // xóa flag ngay (sync)
    history.replaceState(null,'',window.location.pathname); // xóa hash khỏi URL
    // Show loading
    el('pg-login').style.display='flex';
    el('pg-app').style.display='none';
    el('gsi-btn-wrap').innerHTML='';
    el('l-loading').style.display='block';
    el('l-err').style.display='none';
    // ── ASYNC: fetch user info ──
    fetch('https://www.googleapis.com/oauth2/v3/userinfo',{
      headers:{Authorization:'Bearer '+params.access_token}
    })
    .then(function(r){return r.json();})
    .then(function(info){
      el('l-loading').style.display='none';
      if(!info||!info.email){
        showLoginErr('Could not read account info. Please try again.');
        OAUTH_HANDLING=false;
        initGoogleSignIn();
        return;
      }
      handleGooglePayload(info); // login bình thường
    })
    .catch(function(){
      el('l-loading').style.display='none';
      showLoginErr('Connection error. Please try again.');
      OAUTH_HANDLING=false;
      initGoogleSignIn();
    });
  })();

  // ── 1. Restore session (survives F5) ──
  (function restoreSession(){
    if(OAUTH_HANDLING) return; // OAuth đang xử lý — không chạy
    try{
      var saved=localStorage.getItem('cmi_u');
      if(!saved){initGoogleSignIn();return;}
      var sess=JSON.parse(saved);
      if(!sess.role){initGoogleSignIn();return;} // invalid session
      U={username:sess.username,email:sess.email||'',
         role:sess.role,dept:sess.dept||null,
         name:sess.name,color:sess.color,ini:sess.ini||''};
      if(sess.selY)selY=sess.selY;
      if(sess.selM!=null)selM=sess.selM;
      if(sess.selBodY)selBodY=sess.selBodY;
      if(sess.selBodM!=null)selBodM=sess.selBodM;
      el('pg-login').style.display='none';
      el('pg-app').style.display='flex';
      var hBtn2=el('rp-hist-btn');
      if(hBtn2) hBtn2.style.display='none';
      setSyncBadge('loading');
      startMsgBackgroundPoll();
      fetchSheetData(function(){
        if(U.role==='bod'||U.role==='admin'){buildbodLeft();renderbodRight(null);}
        else{deptId=U.dept;buildDeptLeft();renderDeptRight();}
      });
      return; // skip GIS init if already logged in
    }catch(e){}
    initGoogleSignIn(); // no session → show Google button
  })();

  el('btn-logout').addEventListener('click',doLogout);

  // ── Fix bfcache: khi user nhấn nút Back của browser sau khi Sign Out ──
  // Browser restore page từ cache ở trạng thái đã login → DOMContentLoaded
  // không chạy lại → restoreSession không chạy → page vẫn hiện app dù đã logout.
  // pageshow fires mỗi lần page được hiển thị, kể cả từ bfcache (evt.persisted=true).
  window.addEventListener('pageshow', function(evt){
    if(!evt.persisted) return; // load bình thường, không cần xử lý
    // Page được restore từ bfcache
    var hasSession = !!localStorage.getItem('cmi_u');
    if(!hasSession && el('pg-app').style.display !== 'none'){
      // Cached page đang hiện trạng thái logged-in nhưng session đã bị xóa → reload
      window.location.reload();
    }
  });

  // Drill-down modal close & export
  el('drill-cls-btn').addEventListener('click',closeDrill);

  // ── Notification dropdown toggle ──
  document.body.addEventListener('click',function(e){
    var notifBtn=el('notif-btn'),notifPanel=el('notif-panel');
    // Toggle on button click
    if(e.target.closest('#notif-btn')){
      if(notifPanel) notifPanel.classList.toggle('open');
      return;
    }
    // Click on a dept item → open msg panel for that dept
    var notifItem=e.target.closest('[data-notif-dept]');
    if(notifItem){
      var dId=notifItem.dataset.notifDept;
      if(notifPanel) notifPanel.classList.remove('open');
      // If BOD, navigate to that dept first
      if(U&&(U.role==='bod'||U.role==='admin')) bodViewDept(dId);
      openMsgPanel(dId);
      return;
    }
    // Close if clicking outside
    if(notifPanel&&notifPanel.classList.contains('open')){
      if(!e.target.closest('#notif-wrap')) notifPanel.classList.remove('open');
    }
  });
  el('drill-ov').addEventListener('click',function(e){if(e.target===el('drill-ov'))closeDrill();});
  el('drill-exp-btn').addEventListener('click',function(){
    if(!drillChart)return;
    // Build filename: title + date-range + timestamp
    var title=(el('drill-title').textContent||'chart').replace(/[/\\?%*:|"<>]/g,'-').trim();
    var now=new Date();
    var ts=now.getFullYear()+''+String(now.getMonth()+1).padStart(2,'0')
           +String(now.getDate()).padStart(2,'0')
           +'-'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0');
    var rangeStr=(el('drill-sub')?el('drill-sub').textContent:'').replace(/→/g,'to').replace(/\s+/g,'-').trim();
    var filename=title+(rangeStr?'_'+rangeStr:'')+'_'+ts+'.png';
    // Render with white background (prevents transparent/checkerboard)
    var origCanvas=drillChart.canvas;
    var tmpCanvas=document.createElement('canvas');
    tmpCanvas.width=origCanvas.width;
    tmpCanvas.height=origCanvas.height;
    var tmpCtx=tmpCanvas.getContext('2d');
    tmpCtx.fillStyle='#ffffff';
    tmpCtx.fillRect(0,0,tmpCanvas.width,tmpCanvas.height);
    tmpCtx.drawImage(origCanvas,0,0);
    var a=document.createElement('a');
    a.href=tmpCanvas.toDataURL('image/png');
    a.download=filename;
    a.click();
  });

  // Chart grid click → drill-down
  document.body.addEventListener('click',function(e){
    var cc=e.target.closest('.charts-grid .cc');
    if(cc&&cc.dataset.chartId){
      var chart=CH[cc.dataset.chartId];
      if(chart){
        var sub=cc.dataset.chartSub||'';
        openDrill(cc.dataset.chartTitle||'Chart Detail',chart,sub);
      }
    }
  });

  // FIX #6: back button wired here
  el('btn-bod-back').addEventListener('click',function(){
    accOpen=null; buildbodLeft(); renderbodRight(null);
  });

  // sync badge click to refresh
  el('sync-badge').addEventListener('click',function(){
    if(!U)return;
    fetchSheetData(function(){
      if(U.role==='bod'||U.role==='admin'){buildbodLeft();renderbodRight(accOpen);}
      else{buildDeptLeft();renderDeptRight();}
    });
  });

  el('lp-body').addEventListener('click',function(e){
    var t=e.target;
    var ah=t.closest('.acc-h');if(ah){toggleAcc(ah.dataset.dept);return;}
    if((t.classList.contains('vc-btn')||t.closest('.vc-btn'))&&(t.dataset.dept||t.closest('[data-dept]'))){
      var dept=(t.dataset.dept||t.closest('[data-dept]').dataset.dept);
      bodViewDept(dept);return;
    }
    if(t.closest('#sv-btn')){saveDept();return;}
    if(t.id==='btn-unlock'||t.closest('#btn-unlock')){UNLOCKED[deptId+'_'+selY+'_'+selM]=true;buildDeptLeft();return;}
    // btn-chpw removed (no password in Gmail auth)
    if(t.dataset.quick){setQ(t.dataset.quick);return;}
    if(t.id==='dr-apply-d'||t.id==='dr-apply-b'){applyDR();return;}
  });
  el('lp-body').addEventListener('change',function(e){
    if(e.target.id==='s-m'||e.target.id==='s-y'){onPC();return;}
    if(e.target.id==='bod-s-m'||e.target.id==='bod-s-y'){
      var bm=el('bod-s-m'),by=el('bod-s-y');
      if(bm)selBodM=parseInt(bm.value);
      if(by)selBodY=parseInt(by.value);
      buildbodLeft();
      return;
    }
  });
  el('rp-body').addEventListener('click',function(e){
    var t=e.target;
    var btn=t.closest('[data-dept]');
    if(btn&&btn.classList.contains('vc-btn')){bodViewDept(btn.dataset.dept);return;}
    if(t.classList.contains('vc-btn')&&t.dataset.dept){bodViewDept(t.dataset.dept);}
  });
  document.body.addEventListener('click',function(e){
    var t=e.target;
    if(t.id==='rp-open-msg'||t.closest('#rp-open-msg')){
      var d=t.dataset.dept||(t.closest('[data-dept]')||{}).dataset.dept||deptId;
      if(d)openMsgPanel(d);return;}
    if(t.id==='rp-hist-btn'||t.closest('#rp-hist-btn')){showMsgHistory();return;}
    if(t.id==='msg-panel-close-btn'){closeMsgPanel();return;}
    if(t.id==='msg-send-btn'){sendMsg();return;}
    if(t.id==='modal-close-x'||t===el('modal-overlay')){el('modal-overlay').style.display='none';return;}
  });
  el('msg-txt-input').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
});
</script>
</body>
</html>
